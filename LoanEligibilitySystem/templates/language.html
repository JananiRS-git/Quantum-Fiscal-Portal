<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        form { display: inline-block; margin-top: 20px; }
        button { 
            padding: 10px 20px; 
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .english { background-color: #4CAF50; color: white; }
        .tamil { background-color: #FF9800; color: white; }
    </style>
</head>
<body>

    <h2>Choose Your Language</h2>
    
    <form method="post">
        <button class="english" name="language" value="english">English</button>
        <button class="tamil" name="language" value="tamil">தமிழ்</button>
    </form>

</body>
</html>
