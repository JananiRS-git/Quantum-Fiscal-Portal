<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Application</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Arial', sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #333;
        }
        .form-label {
            font-weight: bold;
        }
        .btn-submit {
            width: 100%;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Loan Application Form</h2>
    <form action="/" method="POST">

        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" class="form-control" name="name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Aadhar:</label>
            <input type="text" class="form-control" name="aadhar" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mobile:</label>
            <input type="text" class="form-control" name="mobile" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Gender:</label>
            <select class="form-select" name="gender" required>
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Married:</label>
            <select class="form-select" name="married" required>
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Education:</label>
            <select class="form-select" name="education" required>
                <option value="">Select</option>
                <option value="Graduate">Graduate</option>
                <option value="Not Graduate">Not Graduate</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Self Employed:</label>
            <select class="form-select" name="self_employed" required>
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Applicant Income:</label>
            <input type="number" class="form-control" name="applicant_income" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Co-applicant Income:</label>
            <input type="number" class="form-control" name="coapplicant_income">
        </div>

        <div class="mb-3">
            <label class="form-label">Loan Amount:</label>
            <input type="number" class="form-control" name="loan_amount" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Loan Term (months):</label>
            <input type="number" class="form-control" name="loan_term" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Credit History (0/1):</label>
            <input type="number" class="form-control" name="credit_history" min="0" max="1" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Property Area:</label>
            <select class="form-select" name="property_area" required>
                <option value="">Select</option>
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semiurban</option>
                <option value="Rural">Rural</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Credit Score:</label>
            <input type="number" class="form-control" name="credit_score" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Verified Income:</label>
            <input type="number" class="form-control" name="verified_income">
        </div>

        <div class="mb-3">
            <label class="form-label">Fraud Alerts:</label>
            <input type="text" class="form-control" name="fraud_alerts">
        </div>

        <div class="mb-3">
            <label class="form-label">Existing Loan Status:</label>
            <input type="text" class="form-control" name="existing_loan_status">
        </div>

        <div class="mb-3">
            <label class="form-label">Property Owned:</label>
            <input type="text" class="form-control" name="property_owned">
        </div>

        <button type="submit" class="btn btn-primary btn-submit">Submit Application</button>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
